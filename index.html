<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrushIt — Focus Dashboard</title>
    <meta name="description" content="A modern SaaS productivity and focus dashboard to help you lock in and get things done." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#e8772e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CrushIt" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <!-- App Shell -->
    <div id="root" style="height: 100vh; width: 100vw;"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Workers -->
    <script>
      if ('serviceWorker' in navigator) {
          // FCM Service Worker (background push)
          navigator.serviceWorker.register('/firebase-messaging-sw.js')
              .then(reg => console.log('FCM SW registered:', reg.scope))
              .catch(err => console.warn('FCM SW failed:', err));
      }
    </script>
  </body>
</html>
